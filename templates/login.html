<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in - ChatNest</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-inner">
            <a href="/" class="logo">ChatNest</a>
            <div class="nav-links">
                <a href="/signup">Sign up</a>
            </div>
        </div>
    </nav>

    <div class="wrap">
        <div class="card" style="max-width: 420px; margin: 24px auto;">
            <h2 style="margin-bottom: 20px;">Log in</h2>
            <div id="alert-container"></div>

            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required>
                </div>
                <div class="form-group">
                    <label style="display:flex;align-items:center;gap:6px;font-weight:normal;">
                        <input type="checkbox" id="remember"> Remember me
                    </label>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;">Log in</button>
            </form>

            <p style="text-align:center;margin-top:16px;font-size:14px;color:#666;">
                No account? <a href="/signup">Sign up</a>
            </p>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
    <script>
        function handleLogin(e) {
            e.preventDefault();
            fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value,
                    remember: document.getElementById('remember').checked
                })
            })
            .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, d: d }; }); })
            .then(function (r) {
                if (r.ok) {
                    var next = new URLSearchParams(window.location.search).get('next');
                    window.location.href = next || '/dashboard';
                } else {
                    showAlert(r.d.error || 'Login failed', 'error');
                }
            })
            .catch(function () { showAlert('Something went wrong', 'error'); });
        }
    </script>
</body>
</html>
