<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - ChatNest</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">💬 ChatNest</a>
            <div class="nav-links">
                <a href="/login">Login</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="card" style="max-width: 500px; margin: 40px auto;">
            <h2 style="margin-bottom: 30px; text-align: center;">Create Your Account</h2>
            
            <div id="alert-container"></div>

            <form id="signup-form" onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required minlength="3">
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required minlength="6">
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Sign Up</button>
            </form>

            <p style="text-align: center; margin-top: 20px; color: #666;">
                Already have an account? <a href="/login" style="color: #667eea;">Login here</a>
            </p>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
    <script>
        async function handleSignup(event) {
            event.preventDefault();
            
            const form = event.target;
            const formData = {
                username: form.username.value,
                email: form.email.value,
                password: form.password.value
            };

            try {
                const response = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('Account created successfully! Redirecting...', 'success');
                    const params = new URLSearchParams(window.location.search);
                    const next = params.get('next');
                    setTimeout(() => {
                        window.location.href = next || '/dashboard';
                    }, 1500);
                } else {
                    showAlert(data.error || 'Signup failed. Please try again.', 'error');
                }
            } catch (error) {
                console.error('Signup error:', error);
                showAlert('An error occurred. Please try again.', 'error');
            }
        }
    </script>
</body>
</html>
