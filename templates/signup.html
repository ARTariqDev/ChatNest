{% extends "base.html" %}
{% block title %}Sign up - ChatNest{% endblock %}

{% block body %}
    <div class="wrap">
        <div class="card" style="max-width:420px;margin:24px auto;">
            <h2 style="margin-bottom:20px;">Sign up</h2>
            <form method="POST">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" name="username" id="username" required minlength="3">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" name="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" name="password" id="password" required minlength="6">
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;">Create account</button>
            </form>
            <p style="text-align:center;margin-top:16px;font-size:14px;color:#666;">
                Already have an account? <a href="/login">Log in</a>
            </p>
        </div>
    </div>
{% endblock %}
