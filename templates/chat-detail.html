<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - ChatNest</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-inner">
            <a href="/" class="logo">ChatNest</a>
            <div class="nav-links" id="auth-links"></div>
        </div>
    </nav>

    <div class="wrap">
        <a href="/dashboard" style="font-size:14px;">Back to dashboard</a>

        <div id="chat-info" class="card" style="margin-top:12px;">
            <div class="loading">Loading...</div>
        </div>

        <div class="card">
            <h3>Embed settings</h3>

            <div class="form-group" style="margin-top:12px;">
                <label for="page-id-input">Page ID</label>
                <input type="text" id="page-id-input" value="page-example" oninput="updateEmbed()">
                <small>A unique ID per page, like a video ID or article slug.</small>
            </div>

            <!-- presets -->
            <label style="font-size:14px;font-weight:500;">Color presets</label>
            <div class="preset-row" style="margin-top:6px;">
                <button class="preset-btn" onclick="applyPreset('#ffffff','#333333','#007bff')">Light</button>
                <button class="preset-btn" onclick="applyPreset('#1a1a2e','#e0e0e0','#7c6af7')">Dark</button>
                <button class="preset-btn" onclick="applyPreset('#0f0f0f','#ffffff','#ff0000')">YouTube</button>
                <button class="preset-btn" onclick="applyPreset('#fafafa','#111111','#1db954')">Spotify</button>
                <button class="preset-btn" onclick="applyPreset('#fff8f0','#2d2d2d','#e8612c')">Warm</button>
                <button class="preset-btn" onclick="applyPreset('#f0f7ff','#1a2a3a','#0066cc')">Ocean</button>
            </div>

            <!-- color pickers -->
            <div class="color-grid">
                <div>
                    <label style="font-size:13px;">Background</label>
                    <div class="color-row">
                        <input type="color" id="color-bg" value="#ffffff" oninput="syncHex('bg');updateEmbed()">
                        <input type="text" id="hex-bg" value="#ffffff" maxlength="7" oninput="syncPicker('bg');updateEmbed()">
                    </div>
                </div>
                <div>
                    <label style="font-size:13px;">Text</label>
                    <div class="color-row">
                        <input type="color" id="color-fg" value="#333333" oninput="syncHex('fg');updateEmbed()">
                        <input type="text" id="hex-fg" value="#333333" maxlength="7" oninput="syncPicker('fg');updateEmbed()">
                    </div>
                </div>
                <div>
                    <label style="font-size:13px;">Accent</label>
                    <div class="color-row">
                        <input type="color" id="color-accent" value="#007bff" oninput="syncHex('accent');updateEmbed()">
                        <input type="text" id="hex-accent" value="#007bff" maxlength="7" oninput="syncPicker('accent');updateEmbed()">
                    </div>
                </div>
            </div>

            <h4 style="margin-top:16px;">Embed code</h4>
            <div class="code-block">
                <button class="copy-btn" onclick="copyEmbed()">Copy</button>
                <pre id="embed-code"></pre>
            </div>

            <h4 style="margin-top:20px;">Preview</h4>
            <div style="border:1px solid #ddd;border-radius:4px;overflow:hidden;margin-top:8px;">
                <iframe id="preview-iframe" width="100%" height="450" frameborder="0" style="display:block;"></iframe>
            </div>
        </div>

        <div class="card">
            <h3>API</h3>
            <div style="margin-top:8px;font-size:13px;font-family:monospace;">
                <p id="api-get" style="margin-bottom:6px;"></p>
                <p id="api-post"></p>
            </div>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
    <script>
        var slug = window.location.pathname.split('/').pop();
        var chat = null;

        fetch('/api/chat/' + slug)
            .then(function (r) { return r.json(); })
            .then(function (d) {
                if (!d.chat) {
                    document.getElementById('chat-info').innerHTML = '<p>Chat not found.</p>';
                    return;
                }
                chat = d.chat;
                document.getElementById('chat-info').innerHTML =
                    '<h2>' + chat.name + '</h2>' +
                    '<p style="color:#666;margin:6px 0;">' + (chat.description || '') + '</p>' +
                    '<span class="chat-slug">' + chat.slug + '</span>';
                updateEmbed();
            });

        function syncHex(k) {
            document.getElementById('hex-' + k).value = document.getElementById('color-' + k).value;
        }
        function syncPicker(k) {
            var v = document.getElementById('hex-' + k).value;
            if (/^#[0-9a-fA-F]{6}$/.test(v)) document.getElementById('color-' + k).value = v;
        }
        function applyPreset(bg, fg, accent) {
            document.getElementById('color-bg').value = bg;  document.getElementById('hex-bg').value = bg;
            document.getElementById('color-fg').value = fg;  document.getElementById('hex-fg').value = fg;
            document.getElementById('color-accent').value = accent; document.getElementById('hex-accent').value = accent;
            updateEmbed();
        }

        function updateEmbed() {
            if (!chat) return;
            var pid    = document.getElementById('page-id-input').value || 'page-example';
            var bg     = document.getElementById('hex-bg').value.replace('#', '');
            var fg     = document.getElementById('hex-fg').value.replace('#', '');
            var accent = document.getElementById('hex-accent').value.replace('#', '');
            var base   = window.location.origin;
            var src    = base + '/embed/' + chat.slug + '/' + pid + '?bg=' + bg + '&fg=' + fg + '&accent=' + accent;

            document.getElementById('embed-code').textContent =
                '<iframe\n  src="' + src + '"\n  width="100%"\n  height="600"\n  frameborder="0">\n</iframe>';
            document.getElementById('preview-iframe').src = src;
            document.getElementById('api-get').textContent = 'GET ' + base + '/api/comment/' + chat.slug + '/' + pid;
            document.getElementById('api-post').textContent = 'POST ' + base + '/api/comment/create';
        }

        function copyEmbed() {
            copyToClipboard(
                document.getElementById('embed-code').textContent,
                document.querySelector('.copy-btn')
            );
        }
    </script>
</body>
</html>
